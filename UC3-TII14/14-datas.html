<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datas</title>
</head>

<body>
    <script>
        // Objeto Date

        // O objeto Date é usado para representar data e horários. Ele premite criar, manipular e formatar datas.


        // Data atual
        console.log(new Date()); // Exibe a data e hora atual

        // Data especifica (ano,mes,dia,hora,minuto,segundo)
        console.log(new Date(1991, 9, 25, 8, 11, 25)); // 25 de outrubro de 1991, 08:11:25

        // Data apartir de uma string
        console.log(new Date("1991-10-25T08:11:25Z")) // ISO 8601



        const data = new Date();
        console.log(data.getFullYear()); //ano atual
        console.log('----')
        console.log(data.getMonth() + 1); // mes atual
        console.log('----')
        console.log(data.getDate()); // Dia do mes
        console.log(data.getDay()); // Dia do semana
        console.log(data.getHours()); // Hora
        console.log(data.getMinutes()); // Minutos
        console.log(data.getSeconds()); // Segundos
        console.log(data.getMilliseconds()); // milissegundos
        console.log(data.getTime()); // Retorna o timestamp (milissegundo desde 1º de janeiro de 1970 - 'Unix Epoch')


        // Timestamp

        // O timestamp 
        // o timestamp é um número que representa a quantidade de milissegundos desde 1º de janeiro de 1970 (conhecido como "Unix Epoch")

        var timestamp = Date.now(); // retorna a timestamp atual

        console.log(timestamp);

        dataAtual = new Date(timestamp);
        console.log(dataAtual);

        // Formatação de data


        var dia = data.getDate();
        var mes = data.getMonth() + 1;
        var ano = data.getFullYear();

        console.log(`${dia}/${mes}/${ano}`);


        // Diferença entre datas
        // Você pode calcular a diferença entre duas datas subtraindo seus timestamp
        console.log('-------')
        var data1 = new Date(2026, 5, 12)
        var data2 = new Date(2026, 5, 15)

        var diferenca = data2 - data1;
        console.log(diferenca);

        var dias = diferenca / (1000 * 60 * 60 * 24);
        console.log(dias);



        // ----------------
        console.log('-----------')

        let timestampDia = 86400000;
        let qtdDia = 5;
        let calculo = timestampDia * qtdDia;

        console.log(calculo)

        var dias = calculo / (1000 * 60 * 60 * 24);
        console.log(dias);


        // fusos horários (Times zones)
        console.log('-----------')
        let formatador = new Intl.DateTimeFormat(
            'en-GB',
            {
                timeZone: 'Asia/Tokyo',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
            }
        );
        console.log(formatador.format(data));

        console.log(data.toLocaleDateString())


    </script>
</body>

</html>
