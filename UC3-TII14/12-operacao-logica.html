<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operação logica</title>
</head>
<body>

    <script>
        // Operadores lógicos
        // Esses operadores são usados para combinar expressões lógicas

        // Operador logico E (&&): Retorna verdadeiro (true) se ambas as expressões forem verdadeiras

        let nome = true
        let senha = true

        let resultado = nome && senha
        console.log(resultado)

        nome = 'Diego'
        senha = '1234'

        resultado = nome == "Diego" && senha == "1234"

        console.log(resultado)


        // Operador logico OU (||): Retorna verdadeiro (true) se pelo menos uma das expressões forem verdadeira 

        nome = 'Diego'
        senha = '1234'

        resultado = nome == "Diego" || senha == "1234"

        console.log(resultado)

    </script>
    
</body>
</html>
