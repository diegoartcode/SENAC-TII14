<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variaveis</title>
  
</head>
<body>
    <script>
        // var
        // variaveis declarada com var tem escopo global ou de função
        // podem ser atualizadas e declaradas novamente dentro do seu escopo.

        var nome = "Diego";
        console.log(nome);

        var nome = "Maria";
        console.log(nome);

        nome = "Romel";
        console.log(nome);

        // let
        // variaveis declarada com let tem escopo de bloco
        // podem ser atualizadas, mas não podem ser declaradas novamente 

        let idade = 34;
        console.log(idade);

        idade = 55;
        console.log(idade);

        // const
        // constantes o valor não pode ser modificado

        const CIDADE = 'São Paulo';
        console.log(CIDADE);

        // CIDADE = "Rio de Janeiro";

        // STRING
        let string = "Sou um texto";
        console.log(string);

        // BOOLEAN
        let maiorDeIdade = true;
        let menorDeIdade = false;

        console.log(maiorDeIdade);
        console.log(typeof maiorDeIdade);

        // NUMBER   
        idade = 33;
        let preco = 25.90;

        console.log(typeof preco);



    </script>
</body>
</html>
