        // O que é array

        // Um array é uma estrutura de dados que permite armazenar múltiplos valores em única variável. Em JavaScript, arrays são objetos especiais que armazenam elementos de forma indexada, começando do índice 0.

        let frutas = ['Maça', 'Banana', 'Uva', 'Laranja'];
        console.log(frutas);

        let nomes = new Array('Diego', 'João', 'Maria', 'Romeu', 'Julieta');
        console.log(nomes);

        let misto =

        console.log(misto[3]['nome']);

        console.log(misto[2]);

        console.log(misto[4][2]);

        let matriz = [
            [1, 2, 3],
            [4, 5, [5, 3, 6]],

        ];

        console.log(matriz[1][2][1])

        console.log(texto[3]);
        console.log(texto.length); // pegar tanho do array

        for (i = 0; i < texto.length; i++) {
            console.log(texto[i])

            if (texto[i] == '!') {
                console.log('Posição' + i + 1)
            }
        }

        console.log('---------------')
        textocompleto = ""
        for (i = 0; i < texto.length; i++) {
            letra = texto[i];
            textocompleto += letra
        }

        console.log(textocompleto)


        console.log('--------------------------')

        // converter o array em string
        //O metodo toString() converte um array em uma string, separando os elementos por virgula

        const fruits = ['Orange', 'Apple', 'Mango'];

        console.log(fruits);
        console.log(fruits.toString());

        // O metodo join() tambem converte um array em uma string, mas permite especificar o separador

        console.log(fruits.join(' * '));

        numeros = [40, 100, 1, 5, 25, 10];

        // Ordenando array

        // O método sort() ordena os elementos de um array alfabeticamente ou numericamente.
        // O método sort() altera o array original e retorna o array ordenado
        // Por padrão, a ordenação é feita em ordem alfabética crescente.
        // Para ordenar numericamente, é necessário passar por uma função de comparação como argumento.
        // A função de comparação recebe dois parâmetros (a e b) e retorna um valor negativo, positivo ou zero, dependendo da comparação ente a e b.
        // Se a função de comparação retornar um valor negativo, a ordenação será feita em ordem crescente.
        // Se a função de comparação retornar um valor positivo, a ordenação será feita em ordem decrescente.
        // Se a função de comparação retornar zero, os elementos permanecerão inalterados.

        fruits.sort()
        console.log(fruits)

        numeros.sort((a, b) => a - b) // ordenar de forma crescente
        console.log(numeros)

        numeros.sort((a, b) => b - a) // ordenar de forma decrescente
        console.log(numeros)


        frutas = ['banana', 'Maça', 'laranja', 'Uva'];

        console.log(frutas)

        console.log(frutas.sort())

        console.log(frutas.sort((a, b) => a.localeCompare(b)))

        // atividade
        // criar um array chamado animais e adicione pelo menos 4 nomes de animais
        // exiba no console o primeiro e o ultimo animal da lista
        // mostre no console o total de elementos no array


        let animais = ['Cachorro', 'Tigre', 'Leão', 'Gato', 'pato', 'teste'];

        console.log(animais[0]);
        console.log(animais[3]);
        console.log(animais.length);
        console.log(animais[animais.length - 1]);


        // adicionando e removendo elementos de um array

        // Adicionando elemento
        // Existem dois tipos de métodos principais para adicionar elementos a um array

        // metodo push() - adiciona no final

        frutas = ['Uva', 'Banana', 'Maça', 'Laranja'];
        console.log(frutas);

        frutas.push('Manga')
        console.log(frutas);

        // metodo unshift() - adiciona no inicio
        frutas.unshift('Morango');
        console.log(frutas);

        // Remover elemento
        // metodo pop() - remove do final

        frutas.pop();
        console.log(frutas);

        // metodo shift() - remove do inicio

        frutas.shift();
        console.log(frutas);

        // percorrendo arrays

        animais = ['Cachorro', 'Tigre', 'Leão', 'Gato', 'Pato'];

        // usando o laço de repetição for
        for (i = 0; i < animais.length; i++) {
            console.log(animais[i])
        }
        console.log('-----------')

        // usando o laço de repetição for....of
        for (animal of animais) {
            console.log(animal)
        }
        console.log('-----------')

        // usando o laço de repetição forEach()
        animais.forEach(animal => console.log(animal));

        teste = '';
        animais.forEach(function (animal) {

            teste += animal;
            teste += " ";
        });

        console.log(teste);
        console.log('-----------')
        // metodos uteis para manipulação de arrays

        // indexOf() - encontra o indice de um elemento

        let cores = ['Azul', 'Amarelo', 'Vermelho', 'Verde', 'Preto'];
        console.log(cores.indexOf('Vermelho'));

        // splice() - remove ou substitui elementos

        // console.log(cores.splice(2,1))
        console.log(cores.splice(1, 2));
        console.log(cores);

        // slice() - retorna parte de um array

        console.log(cores.slice(1, 3))
        console.log(cores)

        // map() - retorna um novo array modificado

        numeros = [40, 100, 1, 5, 25, 10];
        // dobro = numeros.map(function(num){
        //     console.log(num*2)
        // })


        // filter() - filtra elementos com base em uma condição
        numeros.filter(function (num) {
            if (num % 2 === 0) {
                console.log(num)
            }
        });

        // atividade 
        // o usuario entra com um numero positivo
        // e o sistema fala se ele é positivo ou negativo

        numUsuario = parseInt(prompt('Digite um numero'));    
        
        if(isNaN(numUsuario)){
            console.log("Erro: Insira apenas números válidos")
        }
        else if (numUsuario === 0) {
            console.log(`valor digitado ${numUsuario} é neutro`)
        }
        else if (numUsuario < 0) {
            console.log(`valor digitado ${numUsuario} é negativo`)
        }
        else {
            console.log(`valor digitado ${numUsuario} é positivo`)
        }

        // atividade 
        // agora mostre se o numero é par ou impar

        if(numUsuario % 2 === 0){
            console.log(`O número ${numUsuario} é par!`);
        }else{
            console.log(`O número ${numUsuario} é impar!`);
        }

        // atividade
        // crie um array chamado alunos com pelo menos 5 nomes
        // adicione um aluno novo ao final e outro no inicio
        // remova o primeiro aluno da lista
        // encontre o indice de um nome especifico
        // filtre os alunos cujo nome tenha mais de 5 letras

        alunos = ['diego','maria','joão','romeu','julieta'];

        alunos.push('mariana');
        console.log(alunos);
        alunos.unshift('paulo');
        console.log(alunos);
        alunos.shift('diego');
        console.log(alunos);

        console.log(alunos.indexOf('julieta'));
