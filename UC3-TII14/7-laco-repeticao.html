<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laço de repetição</title>
</head>

<body>
    <script>
        console.log('passo 1')
        console.log('passo 2')
        console.log('passo 3')
        console.log('passo 4')
        console.log('passo 5')
        console.log('passo 6')
        console.log('passo 7')
        console.log('passo 8')
        console.log('passo 9')
        console.log('passo 10')

        console.log('-----------')


        // for = para
        for (let i = 1; i <= 10; i++) { // i++ =  i = i+1 
            console.log('Passo ' + i)
        }



        for (let i = 10; i >= 1; i--) { // i-- =  i-1 
            console.log('Passo ' + i)
        }

        let num = parseInt(prompt('digite um numero'))

        for (let i = 0; i <= 10; i++) {
            //  console.log(i + ' x ' + num + ' = ' +  i * num)
            console.log(`${i} x ${num} = ${i * num}`)
        }


        // while = enquanto
        let i = 0;
        while (i <= 10) {
            console.log('laço while' + i);
            i++;
        }

console.log('--------------------')
        // do while = faça enquanto
        i = 0;
        do{
             console.log('laço do while' + i);
             i++
        }while(i<=10);


console.log('--------------------')



                   
        let lista = ["batata", 2, 3, 4, 5, 6, 7, 8, 9, 10, "Diego", false];
        console.log(lista)
        console.log(lista[12])

        // forEach

        let entrada = prompt('Digite um texto')

        lista.forEach(
            function (e) {
                // console.log(e)

                if(entrada  == e){
                    console.log('Palavra encontrada')
                }else{
                    console.log('Palavra não existe')
                }               
               
            }
        )






    </script>
</body>

</html>
