<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM - Aula 4: Projeto Prático - Lista de Tarefas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
 
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }
 
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
 
        .input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
 
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
 
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
 
        button {
            padding: 12px 20px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
 
        button:hover {
            background-color: #764ba2;
        }
 
        .lista-container {
            margin-top: 20px;
        }
 
        .lista-vazia {
            text-align: center;
            color: #999;
            padding: 30px;
            font-size: 16px;
        }
 
        .tarefa {
            display: flex;
            align-items: center;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 5px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
 
        .tarefa:hover {
            background-color: #f0f0f0;
            transform: translateX(5px);
        }
 
        .tarefa.concluida {
            background-color: #e8f5e9;
            opacity: 0.7;
        }
 
        .tarefa.concluida .texto-tarefa {
            text-decoration: line-through;
            color: #999;
        }
 
        .checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
        }
 
        .texto-tarefa {
            flex: 1;
            font-size: 16px;
            color: #333;
        }
 
        .botao-deletar {
            background-color: #f44336;
            padding: 8px 12px;
            font-size: 14px;
            margin-left: 10px;
        }
 
        .botao-deletar:hover {
            background-color: #d32f2f;
        }
 
        .estatisticas {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #ddd;
        }
 
        .estatistica {
            text-align: center;
        }
 
        .numero {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
 
        .label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
 
        .botoes-acao {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
 
        .botoes-acao button {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }
 
        .botao-limpar {
            background-color: #ff9800;
        }
 
        .botao-limpar:hover {
            background-color: #f57c00;
        }
 
        .botao-limpar-concluidas {
            background-color: #2196f3;
        }
 
        .botao-limpar-concluidas:hover {
            background-color: #1976d2;
        }
 
        code {
            background-color: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Lista de Tarefas</h1>
 
        <!-- ============================================ -->
        <!-- INPUT PARA ADICIONAR TAREFAS -->
        <!-- ============================================ -->
        <div class="input-container">
            <input
                type="text"
                id="input-tarefa"
                placeholder="Adicione uma nova tarefa..."
            >
            <button onclick="adicionarTarefa()">Adicionar</button>
        </div>
 
        <!-- ============================================ -->
        <!-- LISTA DE TAREFAS -->
        <!-- ============================================ -->
        <div class="lista-container">
            <div id="lista-tarefas" class="lista-vazia">
                Nenhuma tarefa adicionada. Comece agora!
            </div>
        </div>
 
        <!-- ============================================ -->
        <!-- ESTATÍSTICAS -->
        <!-- ============================================ -->
        <div class="estatisticas">
            <div class="estatistica">
                <div class="numero" id="total-tarefas">0</div>
                <div class="label">Total</div>
            </div>
            <div class="estatistica">
                <div class="numero" id="tarefas-concluidas">0</div>
                <div class="label">Concluídas</div>
            </div>
            <div class="estatistica">
                <div class="numero" id="tarefas-pendentes">0</div>
                <div class="label">Pendentes</div>
            </div>
        </div>
 
        <!-- ============================================ -->
        <!-- BOTÕES DE AÇÃO -->
        <!-- ============================================ -->
        <div class="botoes-acao">
            <button class="botao-limpar-concluidas">
                Limpar Concluídas
            </button>
            <button class="botao-limpar">
                Limpar Tudo
            </button>
        </div>
    </div>
    <script>
 
        let tarefas = [];
 
        //Funcao de adicionar
        function adicionarTarefa(){
            const inputTarefa = document.getElementById('input-tarefa')
 
            const texto = inputTarefa.value.trim()
 
            if(texto == ''){
                alert('Por favor, digite uma tarefa')
                return;
            }
 
            const tarefa = {
                id: Date.now(),
                texto: texto,
                concluida: false
            }
 
            tarefas.push (tarefa)
            inputTarefa.value = '';
            inputTarefa.focus();
 
            console.log("tarefa adicionada", tarefa);
 
            renderizarTarefas()
            atualizarEstatisticas()
        }
 
        function renderizarTarefas() {
            const listaTarefas = document.getElementById('lista-tarefas')
 
            if (tarefas.length === 0){
                listaTarefas.innerHTML = `Nenhuma tarefa adicionada. Comece agora!`
                listaTarefas.className = 'lista-vazia';
                return;
            }
 
            listaTarefas.className = ' ';
            listaTarefas.innerHTML = ' ';
 
            tarefas.forEach(tarefas=>{
                const divTarefa = document.createElement('div')
 
                divTarefa.className = 'tarefa';
 
                if (tarefas.concluida){
                    divTarefa.classList.add('concluida')
 
                }
 
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'checkbox';
                checkbox.checked = tarefas.concluida;
                checkbox.onchange = () => alterarTarefa(tarefas.id)
            
 
                const textoTarefa = document.createElement('span');
                textoTarefa.className = 'texto-tarefa';
                textoTarefa.textContent = tarefas.texto;
 
                const botaoDeletar = document.createElement('button')
                botaoDeletar.className = 'botao-deletar'
                botaoDeletar.textContent = 'Deletar'
                botaoDeletar.onclick = () => deletarTarefa(tarefas.id)
 
                divTarefa.appendChild(checkbox)
                divTarefa.appendChild(textoTarefa)
                divTarefa.appendChild(botaoDeletar)
 
                listaTarefas.appendChild(divTarefa)
               
            })
        }
 
        function alterarTarefa(id) {
            const tarefa = tarefas.find(t => t.id === id)
 
            if (tarefa) {
                tarefa.concluida = !tarefa.concluida;
                renderizarTarefas()
                atualizarEstatisticas()
            }
        }


        function deletarTarefa(id){
            //remove a tarefa do array
            tarefas = tarefas.filter(t => t.id !== id);

            //atualiza a vizualização 
            renderizarTarefas();
            atualizarEstatisticas();
        }


        function atualizarEstatisticas(){

            // total
            const totalTarefas = tarefas.length;
            console.log(totalTarefas);

            const total = document.getElementById('total-tarefas');
            total.innerText = totalTarefas;
             
            // tarefas concluidas

            const totalTarefasConcluidas = tarefas.filter(t=> t.concluida).length;

            console.log(totalTarefasConcluidas)

            const totalConcluido = document.getElementById('tarefas-concluidas');
            console.log(totalConcluido)

            totalConcluido.innerText = totalTarefasConcluidas
            // taferas pendentes

        }
 
       
 
 
    </script>
</body>
</html>
