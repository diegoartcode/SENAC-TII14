<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h2>Exercicio 3</h2>
    <p>
        Maior Número com EmpateSolicite três números e informe qual é o maior. <br>
        Se houver empate entre dois ou mais números, avise ao usuário.
    </p>
    <input type="text" id="input-num1"> <br>
    <input type="text" id="input-num2"> <br>
    <input type="text" id="input-num3"> <br>
    <button onclick="btnVerificar()">Verificar</button>
    <p id="resultado"></p>

    <script>
        function btnVerificar() {
         
            let input1 = document.getElementById('input-num1').value;
            let input2 = document.getElementById('input-num2').value;
            let input3 = document.getElementById('input-num3').value;

            let resultado = document.getElementById('resultado');

            if (isNaN(input1) || isNaN(input2) || isNaN(input3)) {
                resultado.innerText = "Erro: Insira apenas números válidos";
            } else {                   //2        1    3
                const maior = Math.max(input1, input2, input3);
                const empate = [input1, input2, input3].filter(n => n == maior);

                console.log(maior)
                console.log(empate)
                                                                   
                if (empate.length > 1) {
                    resultado.innerText = `Empate: O maior valor é ${maior}, atingido por ${empate.length} números `;
                } else {
                    resultado.innerText = `O mair número é: ${maior}`;
                }
            }
        }

    </script>
</body>

</html>
