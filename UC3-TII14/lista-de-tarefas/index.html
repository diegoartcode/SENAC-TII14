<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM - Aula 4: Projeto Prático - Lista de Tarefas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
 
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }
 
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
 
        .input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
 
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
 
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
 
        button {
            padding: 12px 20px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
 
        button:hover {
            background-color: #764ba2;
        }
 
        .lista-container {
            margin-top: 20px;
        }
 
        .lista-vazia {
            text-align: center;
            color: #999;
            padding: 30px;
            font-size: 16px;
        }
 
        .tarefa {
            display: flex;
            align-items: center;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 5px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
 
        .tarefa:hover {
            background-color: #f0f0f0;
            transform: translateX(5px);
        }
 
        .tarefa.concluida {
            background-color: #e8f5e9;
            opacity: 0.7;
        }
 
        .tarefa.concluida .texto-tarefa {
            text-decoration: line-through;
            color: #999;
        }
 
        .checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
        }
 
        .texto-tarefa {
            flex: 1;
            font-size: 16px;
            color: #333;
        }
 
        .botao-deletar {
            background-color: #f44336;
            padding: 8px 12px;
            font-size: 14px;
            margin-left: 10px;
        }
 
        .botao-deletar:hover {
            background-color: #d32f2f;
        }
 
        .estatisticas {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #ddd;
        }
 
        .estatistica {
            text-align: center;
        }
 
        .numero {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
 
        .label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
 
        .botoes-acao {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
 
        .botoes-acao button {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }
 
        .botao-limpar {
            background-color: #ff9800;
        }
 
        .botao-limpar:hover {
            background-color: #f57c00;
        }
 
        .botao-limpar-concluidas {
            background-color: #2196f3;
        }
 
        .botao-limpar-concluidas:hover {
            background-color: #1976d2;
        }
 
        code {
            background-color: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Lista de Tarefas</h1>
 
        <!-- ============================================ -->
        <!-- INPUT PARA ADICIONAR TAREFAS -->
        <!-- ============================================ -->
        <div class="input-container">
            <input
                type="text"
                id="input-tarefa"
                placeholder="Adicione uma nova tarefa..."
            >
            <button onclick="adicionarTarefa()">Adicionar</button>
        </div>
 
        <!-- ============================================ -->
        <!-- LISTA DE TAREFAS -->
        <!-- ============================================ -->
        <div class="lista-container">
            <div id="lista-tarefas" class="lista-vazia">
                Nenhuma tarefa adicionada. Comece agora!
            </div>
        </div>
 
        <!-- ============================================ -->
        <!-- ESTATÍSTICAS -->
        <!-- ============================================ -->
        <div class="estatisticas">
            <div class="estatistica">
                <div class="numero" id="total-tarefas">0</div>
                <div class="label">Total</div>
            </div>
            <div class="estatistica">
                <div class="numero" id="tarefas-concluidas">0</div>
                <div class="label">Concluídas</div>
            </div>
            <div class="estatistica">
                <div class="numero" id="tarefas-pendentes">0</div>
                <div class="label">Pendentes</div>
            </div>
        </div>
 
        <!-- ============================================ -->
        <!-- BOTÕES DE AÇÃO -->
        <!-- ============================================ -->
        <div class="botoes-acao">
            <button class="botao-limpar-concluidas">
                Limpar Concluídas
            </button>
            <button class="botao-limpar">
                Limpar Tudo
            </button>
        </div>
    </div>
   <script>

    // ============================================
    // ARRAY QUE ARMAZENA AS TAREFAS
    // ============================================
    let tarefas = [];


    // ============================================
    // FUNÇÃO PARA ADICIONAR TAREFA
    // ============================================
    function adicionarTarefa() {

        // Pegando o input pelo ID
        const inputTarefa =
            document.getElementById('input-tarefa');

        // Pegando o texto digitado
        // trim() remove espaços extras
        const texto =
            inputTarefa.value.trim();

        // Verifica se o input está vazio
        if (texto === '') {

            alert('Por favor, digite uma tarefa');

            // Interrompe a função
            return;
        }

        // Criando objeto da tarefa
        const tarefa = {

            // ID único usando data atual
            id: Date.now(),

            // Texto digitado
            texto: texto,

            // Começa como não concluída
            concluida: false
        };

        // Adiciona a tarefa no array
        tarefas.push(tarefa);

        // Limpa o input
        inputTarefa.value = '';

        // Coloca foco novamente no input
        inputTarefa.focus();

        // Atualiza a lista na tela
        renderizarTarefas();

       
    }


    // ============================================
    // FUNÇÃO PARA MOSTRAR TAREFAS NA TELA
    // ============================================
    function renderizarTarefas() {

        // Pegando a div da lista
        const listaTarefas =
            document.getElementById('lista-tarefas');

        // Verifica se não existe tarefa
        if (tarefas.length === 0) {

            // Mostra mensagem
            listaTarefas.innerHTML =
                'Nenhuma tarefa adicionada. Comece agora!';

            // Classe de lista vazia
            listaTarefas.className = 'lista-vazia';

            return;
        }

        // Remove classe vazia
        listaTarefas.className = '';

        // Limpa lista antes de renderizar novamente
        listaTarefas.innerHTML = '';

        // Percorre todas as tarefas
        tarefas.forEach(tarefa => {

            // ====================================
            // CRIANDO DIV DA TAREFA
            // ====================================
            const divTarefa =
                document.createElement('div');

            divTarefa.className = 'tarefa';

            // Se estiver concluída
            if (tarefa.concluida) {

                // Adiciona classe CSS
                divTarefa.classList.add('concluida');
            }


            // ====================================
            // CHECKBOX
            // ====================================
            const checkbox =
                document.createElement('input');

            checkbox.type = 'checkbox';

            checkbox.className = 'checkbox';

            // Marca checkbox se concluída
            checkbox.checked = tarefa.concluida;

            // Evento ao clicar no checkbox
            checkbox.onchange = () => {

                alterarTarefa(tarefa.id);
            };


            // ====================================
            // TEXTO DA TAREFA
            // ====================================
            const textoTarefa =
                document.createElement('span');

            textoTarefa.className =
                'texto-tarefa';

            textoTarefa.textContent =
                tarefa.texto;


            // ====================================
            // BOTÃO DELETAR
            // ====================================
            const botaoDeletar =
                document.createElement('button');

            botaoDeletar.className =
                'botao-deletar';

            botaoDeletar.textContent =
                'Deletar';

            // Evento ao clicar no botão
            botaoDeletar.onclick = () => {

                deletarTarefa(tarefa.id);
            };


            // ====================================
            // ADICIONANDO ELEMENTOS NA DIV
            // ====================================
            divTarefa.appendChild(checkbox);

            divTarefa.appendChild(textoTarefa);

            divTarefa.appendChild(botaoDeletar);


            // ====================================
            // ADICIONANDO DIV NA LISTA
            // ====================================
            listaTarefas.appendChild(divTarefa);
        });
    }


    // ============================================
    // FUNÇÃO PARA MARCAR COMO CONCLUÍDA
    // ============================================
    function alterarTarefa(id) {

        // Procura tarefa pelo ID
        const tarefa =
            tarefas.find(t => t.id === id);

        // Verifica se encontrou
        if (tarefa) {

            // Inverte true/false
            tarefa.concluida =
                !tarefa.concluida;

            // Atualiza tela
            renderizarTarefas();

           
        }
    }


    </script>
</body>
</html>
